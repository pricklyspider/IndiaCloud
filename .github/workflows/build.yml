name: Build IndiaCloud APK & EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to Gradle
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK Release
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -x lint

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/indiacloud.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: indiacloud-apk
          path: android/app/build/outputs/apk/release/indiacloud.apk
          retention-days: 90

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/indiacloud.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    name: Build Windows EXE
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: windows
        run: npm ci --legacy-peer-deps

      - name: Build React
        working-directory: windows
        run: npm run build
        env:
          CI: false

      - name: Build EXE
        working-directory: windows
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename EXE
        shell: powershell
        run: |
          $files = Get-ChildItem "windows\dist\*.exe"
          if ($files) {
            Copy-Item -Path $files[0].FullName -Destination "windows\dist\indiacloud.exe" -Force
          }

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v3
        with:
          name: indiacloud-exe
          path: windows/dist/indiacloud.exe
          retention-days: 90

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: windows/dist/indiacloud.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-complete:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    name: Build Complete
    if: always()
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v3
        with:
          name: indiacloud-apk

      - name: Download EXE
        uses: actions/download-artifact@v3
        with:
          name: indiacloud-exe

      - name: Summary
        run: |
          echo "✅ Build Complete!"
          echo ""
          echo "📦 Artifacts:"
          ls -lh indiacloud.* 2>/dev/null || echo "Files available in Actions > Artifacts"
